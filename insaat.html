<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İnşaat Galerisi</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="logo-container">
            <a href="index.html">
                <img src="assets/icons/logo.png" alt="ALTINSOY GRUP Logo" class="logo-img">
            </a>
        </div>
        <button class="menu-toggle" onclick="toggleMenu()">☰</button>
        <div class="nav-container">
            <nav class="nav-links">
                <a href="index.html">Anasayfa</a>
                <a href="#about">Hakkımızda</a>
                <a href="yonetin_kurulu.html">Yönetim Kurulu</a>
                <a href="basin.html">Basın Odası</a>              
                <a href="#services">Hizmetlerimiz</a>
            </nav>
            <button class="contact-btn" onclick="window.location.href='contact.html';">İletişim</button>
        </div>
    </header>

    <main>
        <div class="swiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide">
                    <img src="assets/images/insaat1.jpg" alt="İnşaat Görsel 1">
                </div>
                <div class="swiper-slide">
                    <img src="assets/images/insaat2.jpg" alt="İnşaat Görsel 2">
                </div>
                <div class="swiper-slide">
                    <img src="assets/images/insaat3.jpg" alt="İnşaat Görsel 3">
                </div>
                <div class="swiper-slide">
                    <img src="assets/images/insaat4.jpg" alt="İnşaat Görsel 4">
                </div>
                <div class="swiper-slide">
                    <img src="assets/images/insaat5.jpg" alt="İnşaat Görsel 5">
                </div>
            </div>
            <div class="swiper-pagination"></div>
            <div class="swiper-button-prev"></div>
            <div class="swiper-button-next"></div>
        </div>
    </main>

    <footer>
        <div class="footer-container">
                    <img src="assets/icons/logo-white.png" alt="ALTINSOY GRUP Logo" style="width: 180px; height: auto;">
            <ul class="footer-links">
                <li><a href="index.html">Ana Sayfa</a></li>
                <li><a href="#about">Hakkımızda</a></li>
                <li><a href="yonetin_kurulu.html">Yönetim Kurulu</a></li>
                <li><a href="basin.html">Basın Odası</a></li>
                <li><a href="#services">Hizmetler</a></li>
                <li><a href="contact.html">İletişim</a></li>
            </ul>
            <div class="social-icons">
                <a href="#"><img src="assets/icons/instagram.jpg" alt="Instagram"></a>
                <a href="#"><img src="assets/icons/facebook.png" alt="Facebook"></a>
            </div>
        </div>
        <div class="footer-bottom">&copy; 2025 Altınsoy Grup Tüm hakları saklıdır. |<a style="color:white;"> ODi Creative</a></div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const swiper = new Swiper('.swiper', {
            loop: true,
            effect: 'fade',
            fadeEffect: {
                crossFade: true
            },
            autoplay: {
                delay: 3000,
                disableOnInteraction: false,
            },
            pagination: {
                el: '.swiper-pagination',
                clickable: true,
            },
            navigation: {
                nextEl: '.swiper-button-next',
                prevEl: '.swiper-button-prev',
            },
        });

        function toggleMenu() {
            let menu = document.querySelector(".nav-container");
            if (menu.classList.contains("active")) {
                menu.classList.remove("active");
            } else {
                menu.classList.add("active");
            }
        }
    </script>

    <style> 
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #f4f4f4;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 50px;
            background-color: rgba(210, 210, 210, 0.7);
            border-bottom: 1px solid #ddd;
            height: auto;
            position: relative;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
            height: 80px;
        }

        .logo-container img {
            width: 180px;
            height: auto;
            object-fit: contain;
            transition: width 0.3s ease;
        }

        .nav-container {
            display: flex;
            align-items: center;
            gap: 25px;
            z-index: 2000;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .nav-links a {
            text-decoration: none;
            color: gray;
            font-size: 18px;
            position: relative;
            transition: color 0.3s;
        }

        .nav-links a::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -3px;
            width: 0;
            height: 2px;
            background-color: green;
            transition: width 0.4s ease-in-out;
        }

        .nav-links a:hover {
            color: green;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .contact-btn {
            border: 2px solid black;
            background: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            text-transform: uppercase;
            transition: background 0.3s, color 0.3s, transform 0.2s;
            height: 40px;
            width: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 7px;
        }

        .contact-btn:hover {
            background: black;
            color: white;
            transform: scale(1.05);
        }

        .menu-toggle {
            display: none;
            font-size: 28px;
            cursor: pointer;
            background: none;
            border: none;
            outline: none;
            z-index: 3000;
            position: relative;
        }

        /* Main Content Styles */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 120px 0 40px;
        }

        .swiper {
            width: 100%;
            max-width: 1200px;
            height: 80vh;
            margin: 0 20px;
        }

        .swiper-slide {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .swiper-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .swiper-button-next,
        .swiper-button-prev {
            color: white;
            background: rgba(0, 0, 0, 0.5);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            transition: background 0.3s ease;
        }

        .swiper-button-next:hover,
        .swiper-button-prev:hover {
            background: rgba(0, 0, 0, 0.8);
        }

        .swiper-button-next::after,
        .swiper-button-prev::after {
            font-size: 20px;
        }

        .swiper-pagination-bullet {
            width: 12px;
            height: 12px;
            background: white;
            opacity: 0.5;
        }

        .swiper-pagination-bullet-active {
            opacity: 1;
        }

        /* FOOTER */
        footer {
            background: #1B3B1A;
            color: white;
            padding: 50px 20px;
            text-align: center;
            margin-top: auto;
        }

        .footer-container {
            max-width: 1200px;
            margin: auto;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
        }

        .footer-logo {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .footer-links {
            list-style: none;
            padding: 0;
        }

        .footer-links li {
            display: inline-block;
            margin: 0 15px;
        }

        .footer-links a {
            text-decoration: none;
            color: white;
            font-size: 16px;
            transition: color 0.3s, transform 0.3s;
        }

        .footer-links a:hover {
            color: green;
            transform: scale(1.1);
        }

        .social-icons {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .social-icons a {
            display: inline-block;
            width: 40px;
            height: 40px;
        }

        .social-icons img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            transition: transform 0.3s, filter 0.3s;
        }

        .social-icons img:hover {
            transform: translateY(-5px);
            filter: brightness(1.3);
        }

        .footer-bottom {
            margin-top: 25px;
            font-size: 14px;
            opacity: 0.7;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .header {
                padding: 10px 20px;
            }

            .logo-container {
                height: 60px;
            }

            .logo-container img {
                width: 150px;
            }

            .menu-toggle {
                display: block;
                position: absolute;
                right: 20px;
                top: 20px;
            }

            .nav-container {
                flex-direction: column;
                position: absolute;
                top: 80px;
                right: 0;
                width: 100%;
                background-color: white;
                text-align: center;
                padding: 20px 0;
                border-top: 1px solid #ddd;
                display: none;
            }

            .nav-container.active {
                display: flex;
            }

            .nav-links {
                flex-direction: column;
                gap: 15px;
            }

            .contact-btn {
                margin: 15px auto;
            }

            .swiper {
                height: 60vh;
                margin: 0 10px;
            }

            .footer-container {
                flex-direction: column;
                text-align: center;
            }

            .footer-links li {
                display: block;
                margin: 8px 0;
            }
        }
    </style>
</body>
</html>
